  <title>OpenPangu Model Architecture · Pattern Graphviz</title>
  <script>
    (() => {
      const params = new URLSearchParams(window.location.search);
      const storedTheme = window.localStorage && window.localStorage.getItem('openpangu-architecture-theme');
      const theme = params.get('theme') || storedTheme;
      const applyTheme = (nextTheme) => {
        if (nextTheme === 'light' || nextTheme === 'dark' || nextTheme === 'glass') {
          document.documentElement.dataset.theme = nextTheme;
        }
      };
      applyTheme(theme);
      if (params.get('embed') === '1') {
        document.documentElement.dataset.embed = '1';
      }
      window.addEventListener('message', (event) => {
        if (event.data?.type === 'pto-preview-theme') {
          applyTheme(event.data.theme);
        }
      });
    })();
  </script>

  <style>
    * { box-sizing: border-box; }
    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: var(--background);
      color: var(--foreground);
      font-family: var(--font-sans);
    }
    body.openpangu-pattern-page {
      display: block;
      height: 100vh;
      overflow: hidden;
    }
    .openpangu-stage {
      width: 100vw;
      height: 100vh;
      background: var(--model-graphviz-stage-bg, var(--background));
    }
    .openpangu-theme-toggle {
      position: fixed;
      z-index: var(--z-overlay, 200);
      top: 14px;
      right: 14px;
      width: 36px;
      height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md);
      background: color-mix(in srgb, var(--surface-1) 88%, transparent);
      color: var(--foreground);
      font: var(--text-body);
      cursor: pointer;
      backdrop-filter: blur(10px);
    }
    .openpangu-theme-toggle:hover {
      border-color: var(--border-strong);
      background: var(--surface-2);
    }
    .openpangu-overlay-toggle {
      cursor: pointer;
    }
    .openpangu-overlay-toggle circle {
      fill: var(--model-graphviz-toggle-bg);
      stroke: var(--model-graphviz-toggle-border);
      stroke-width: 0.8px;
    }
    .openpangu-overlay-toggle text {
      fill: var(--model-graphviz-toggle-icon);
      font-family: var(--font-sans);
      font-size: 15px;
      font-weight: var(--font-weight-bold);
      text-anchor: middle;
      dominant-baseline: central;
      pointer-events: none;
    }
    .openpangu-repeat-tag rect {
      fill: color-mix(in srgb, var(--surface-1) 86%, var(--warning));
      stroke: color-mix(in srgb, var(--foreground) 18%, transparent);
      stroke-width: 0.75px;
    }
    .openpangu-repeat-tag text {
      fill: var(--background);
      font-family: var(--font-sans);
      font-size: 10px;
      font-weight: var(--font-weight-bold);
      text-anchor: middle;
      dominant-baseline: central;
      letter-spacing: 0;
    }
    :root[data-theme='light'] .openpangu-stage .pto-model-graphviz-node rect,
    :root[data-theme='light'] .openpangu-stage .pto-model-training-edge-tag rect,
    :root[data-theme='light'] .openpangu-stage .openpangu-repeat-tag rect,
    :root[data-theme='light'] .openpangu-stage .pto-model-graphviz-cluster-title-bg,
    :root[data-theme='light'] .openpangu-stage .pto-model-graphviz-cluster-title-tag,
    :root[data-theme='light'] .openpangu-stage .pto-model-graphviz-report-node-badge {
      fill-opacity: 0.5;
    }
    :root[data-theme='light'] .openpangu-stage .openpangu-repeat-tag text {
      fill: var(--foreground);
    }
  </style>

    function depthForNode(id) {
      if (moduleIdSet.has(id)) return modules[id].depth || 0;

    function nodeSpec(id) {

    function rowGap(prevDepth, depth) {
      if (depth > prevDepth) return 74 + (depth - prevDepth) * 18;
      if (depth < prevDepth) return 74 + (prevDepth - depth) * 12;

    function computePositions() {

        .map((row) => row.filter((id) => nodeById.has(id) && isVisibleNode(id)))

          };
        });
        cursor += rowHeight;
        prevDepth = depth;
      });
      function alignSideNode(id, targets, yOffset = 0) {
        if (!isVisibleNode(id) || positions[id]) return;
        const source = nodeSpec(id);
        if (!source) return;

        if (!targetId) return;
        positions[id] = {
          x: source.x,
          y: positions[targetId].y + yOffset,

      }
      alignSideNode('dynamic_cache', ['kv_update', 'self_attention', 'decoder_layer', 'causal_mask', 'past_key_values']);
      alignSideNode('rope_frequencies', ['rotary_embedding', 'apply_rope', 'self_attention']);
      const bottom = Math.max(...Object.values(positions).map((item) => item.y + item.height / 2), 640);
      return { positions, height: Math.round(bottom + 52) };

    function rectForNode(id, positions) {
      const p = positions[id];
      if (!p) return null;

        left: p.x - p.width / 2,
        right: p.x + p.width / 2,
        top: p.y - p.height / 2,

      };

    function mergeRect(bounds, rect) {
      if (!rect) return bounds;
      bounds.left = Math.min(bounds.left, rect.left);
      bounds.right = Math.max(bounds.right, rect.right);
      bounds.top = Math.min(bounds.top, rect.top);
      bounds.bottom = Math.max(bounds.bottom, rect.bottom);

    function clusterActive(moduleId) {
      if (hiddenVisualModules.has(moduleId)) return false;

    }

    function computeClusterBox(moduleId, positions) {

      const bounds = { left: Infinity, right: -Infinity, top: Infinity, bottom: -Infinity };

      (viewGraph.clusters || []).forEach((cluster) => {
        if (!cluster.moduleId) return;
        appendOverlayToggle(svg, cluster.x + cluster.width - 13, cluster.y + 13, cluster.moduleId, false);
        appendRepeatTag(svg, cluster);
      });
    }

    function wireCollapsedNodeToggles(viewGraph) {
      const nodeEls = Array.from(stage.querySelectorAll('.pto-model-graphviz-node'));
      nodeEls.forEach((element, index) => {
        const node = viewGraph.nodes[index];
        if (!node || !moduleIdSet.has(node.id) || expandedModules.has(node.id)) return;
        element.querySelectorAll('.pto-model-graphviz-toggle').forEach((toggle) => {
          toggle.style.cursor = 'pointer';
          toggle.addEventListener('click', (event) => {
            event.preventDefault();
            event.stopPropagation();
            setModuleExpanded(node.id, true);
          });
        });
      });
    }

    function renderAll() {
      if (controller) controller.destroy();
      const viewGraph = buildViewGraph();
      controller = window.PtoModelTrainingGraphvizPattern.render(stage, viewGraph, {
        ariaLabel: 'OpenPangu Embedded 7B V1.1 model architecture graph',
        activeNodeId: null,
        activeRelatedNodeIds: [],
        fitMode: 'full',
        viewportPadding: 48,
        colormap: {
          coreColors: ['#34D399', '#14B8A6', '#0EA5E9', '#3B82F6', '#8B5CF6', '#F59E0B', '#EF4444'],
          saturation: 0.72,
          lightness: 0.42,
          ioColors: {
            input: '#A855F7',
            output: '#22C55E',
            constant: '#64748B',
            parameter: '#3B82F6',
          },
        },
      });
      repositionEdgeTags(viewGraph);
      appendHierarchyOverlays(viewGraph);
      wireCollapsedNodeToggles(viewGraph);
    }

    renderAll();
  </script>
</body>
</html>
