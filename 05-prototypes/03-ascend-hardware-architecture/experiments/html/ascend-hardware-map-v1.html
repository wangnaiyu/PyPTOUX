<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ascend Hardware Map · v1</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap');

/* =========================================================
   FOUNDATION TOKENS  (lift later → 07-designsystem/01-foundations)
   ========================================================= */
:root {
  /* Surface */
  --dgm-bg-0: #050b14;
  --dgm-bg-1: #0a1421;
  --dgm-panel: rgba(14, 26, 42, 0.78);
  --dgm-panel-soft: rgba(20, 34, 54, 0.55);
  --dgm-line: rgba(160, 195, 230, 0.14);
  --dgm-line-strong: rgba(160, 195, 230, 0.26);

  /* Text */
  --dgm-text: #eaf2ff;
  --dgm-text-soft: #b7c9e2;
  --dgm-text-dim: #6b81a0;
  --dgm-text-faint: #475a76;

  /* Semantic palette per object kind */
  --c-shared-h: 195;       /* GM / L2 / shared */
  --c-aic-h: 215;          /* AIC, Cube */
  --c-aiv-h: 145;          /* AIV, Vector */
  --c-mte-h: 35;           /* MTE / FixPipe */
  --c-sdma-h: 265;         /* SDMA independent engine */
  --c-claim-h: 280;        /* CCU / URMA / claim layer */
  --c-scalar-h: 0;         /* Scalar (achromatic, low chroma below) */

  /* Status */
  --status-verified: 1;
  --status-partial: 0.78;
  --status-claim: 0.45;

  /* Geometry */
  --dgm-radius-lg: 18px;
  --dgm-radius-md: 12px;
  --dgm-radius-sm: 8px;
  --dgm-radius-xs: 5px;

  /* Motion */
  --dgm-ease: cubic-bezier(0.22, 0.61, 0.36, 1);
  --dgm-fast: 140ms;
  --dgm-mid: 280ms;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  min-height: 100vh;
  background:
    radial-gradient(ellipse at 18% 8%, rgba(94, 163, 255, 0.10), transparent 42%),
    radial-gradient(ellipse at 82% 12%, rgba(136, 240, 160, 0.06), transparent 40%),
    radial-gradient(ellipse at 50% 100%, rgba(152, 164, 255, 0.08), transparent 50%),
    linear-gradient(180deg, var(--dgm-bg-0), var(--dgm-bg-1));
  color: var(--dgm-text);
  font-family: "Inter", "PingFang SC", "Microsoft YaHei", sans-serif;
  font-size: 13px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  letter-spacing: 0.01em;
}

button { font-family: inherit; color: inherit; cursor: pointer; }

/* =========================================================
   SHELL LAYOUT
   ========================================================= */
.app {
  min-height: 100vh;
  display: grid;
  grid-template-rows: auto 1fr auto;
  gap: 14px;
  padding: 14px;
}

/* ---------- top bar ---------- */
.topbar {
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 18px;
  align-items: center;
  padding: 12px 18px;
  background: var(--dgm-panel);
  border: 1px solid var(--dgm-line);
  border-radius: var(--dgm-radius-lg);
  backdrop-filter: blur(14px);
}

.brand {
  display: flex; gap: 12px; align-items: center;
}
.brand__mark {
  width: 32px; height: 32px;
  border-radius: 9px;
  background: linear-gradient(135deg, hsla(215, 88%, 68%, 0.55), hsla(195, 80%, 60%, 0.25));
  border: 1px solid hsla(215, 88%, 68%, 0.45);
  position: relative;
}
.brand__mark::after {
  content: "";
  position: absolute; inset: 6px;
  border-radius: 4px;
  background:
    linear-gradient(135deg, transparent 49%, rgba(255,255,255,0.2) 50%, transparent 51%),
    linear-gradient(45deg, transparent 49%, rgba(255,255,255,0.2) 50%, transparent 51%);
}
.brand__name { font-weight: 700; font-size: 14px; letter-spacing: 0.04em; }
.brand__sub { color: var(--dgm-text-dim); font-size: 11px; font-family: "IBM Plex Mono", monospace; }

/* PRIMITIVE: tabbar (segmented control) */
.dgm-tabbar {
  display: inline-flex;
  background: var(--dgm-panel-soft);
  border: 1px solid var(--dgm-line);
  border-radius: 10px;
  padding: 3px;
  gap: 2px;
}
.dgm-tabbar__btn {
  position: relative;
  border: 0;
  background: transparent;
  color: var(--dgm-text-soft);
  padding: 7px 14px;
  border-radius: 7px;
  font-size: 12px;
  font-weight: 500;
  display: flex; flex-direction: column; align-items: flex-start;
  gap: 1px;
  transition: background var(--dgm-fast), color var(--dgm-fast);
}
.dgm-tabbar__btn:hover { color: var(--dgm-text); background: rgba(255,255,255,0.04); }
.dgm-tabbar__btn[aria-selected="true"] {
  background: linear-gradient(180deg, hsla(215, 70%, 50%, 0.32), hsla(215, 70%, 35%, 0.18));
  color: var(--dgm-text);
  box-shadow: inset 0 0 0 1px hsla(215, 80%, 65%, 0.3);
}
.dgm-tabbar__btn small {
  font-size: 10px;
  font-family: "IBM Plex Mono", monospace;
  color: var(--dgm-text-dim);
  letter-spacing: 0.03em;
}
.dgm-tabbar__btn[aria-selected="true"] small { color: hsla(215, 80%, 80%, 0.85); }

/* PRIMITIVE: toggle */
.dgm-toggle {
  display: inline-flex; align-items: center; gap: 10px;
  font-size: 12px;
  color: var(--dgm-text-soft);
  user-select: none;
  cursor: pointer;
}
.dgm-toggle__track {
  width: 32px; height: 18px;
  background: rgba(255,255,255,0.08);
  border: 1px solid var(--dgm-line);
  border-radius: 999px;
  position: relative;
  transition: background var(--dgm-fast);
}
.dgm-toggle__thumb {
  position: absolute;
  top: 1px; left: 1px;
  width: 14px; height: 14px;
  background: var(--dgm-text-soft);
  border-radius: 50%;
  transition: transform var(--dgm-fast) var(--dgm-ease), background var(--dgm-fast);
}
.dgm-toggle input { display: none; }
.dgm-toggle input:checked ~ .dgm-toggle__track {
  background: hsla(280, 60%, 55%, 0.45);
}
.dgm-toggle input:checked ~ .dgm-toggle__track .dgm-toggle__thumb {
  transform: translateX(14px);
  background: hsla(280, 90%, 88%, 0.95);
}
.dgm-toggle__hint {
  font-size: 11px;
  color: var(--dgm-text-dim);
  font-family: "IBM Plex Mono", monospace;
}

/* ---------- main 3-column ---------- */
.workbench {
  display: grid;
  grid-template-columns: 232px 1fr 300px;
  gap: 14px;
  min-height: 0;
}

/* ---------- left rail ---------- */
.rail {
  background: var(--dgm-panel);
  border: 1px solid var(--dgm-line);
  border-radius: var(--dgm-radius-lg);
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  backdrop-filter: blur(14px);
  overflow: auto;
}
.rail__title {
  font-size: 11px;
  font-family: "IBM Plex Mono", monospace;
  color: var(--dgm-text-dim);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

/* PRIMITIVE: list */
.dgm-list { display: flex; flex-direction: column; gap: 4px; }
.dgm-list__item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 10px;
  border-radius: var(--dgm-radius-sm);
  border: 1px solid transparent;
  background: transparent;
  text-align: left;
  width: 100%;
  font-size: 12.5px;
  color: var(--dgm-text-soft);
  cursor: pointer;
  transition: background var(--dgm-fast), border-color var(--dgm-fast);
}
.dgm-list__item:hover { background: rgba(255,255,255,0.04); color: var(--dgm-text); }
.dgm-list__item[aria-selected="true"] {
  background: linear-gradient(180deg, hsla(215, 70%, 50%, 0.2), hsla(215, 70%, 50%, 0.08));
  border-color: hsla(215, 80%, 65%, 0.35);
  color: var(--dgm-text);
}
.dgm-list__item[disabled] {
  opacity: 0.35;
  cursor: not-allowed;
  pointer-events: auto;
}
.dgm-list__item[disabled]:hover { background: transparent; color: var(--dgm-text-soft); }
.dgm-list__bullet {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}
.dgm-list__bullet[data-status="verified"] { background: hsl(145, 60%, 60%); }
.dgm-list__bullet[data-status="partial"]  { background: hsl(40, 90%, 60%); }
.dgm-list__bullet[data-status="claim"]    { background: hsl(280, 60%, 65%); }
.dgm-list__name { flex: 1; }
.dgm-list__count {
  font-size: 10px;
  font-family: "IBM Plex Mono", monospace;
  color: var(--dgm-text-dim);
  background: rgba(255,255,255,0.05);
  padding: 2px 6px;
  border-radius: 4px;
}

/* PRIMITIVE: player */
.player {
  display: flex; gap: 6px; align-items: center;
  padding: 8px;
  background: var(--dgm-panel-soft);
  border-radius: var(--dgm-radius-sm);
  border: 1px solid var(--dgm-line);
}
.player__btn {
  width: 28px; height: 28px;
  border: 0;
  border-radius: 6px;
  background: rgba(255,255,255,0.05);
  color: var(--dgm-text-soft);
  display: grid; place-items: center;
  transition: background var(--dgm-fast), color var(--dgm-fast);
}
.player__btn:hover { background: rgba(255,255,255,0.1); color: var(--dgm-text); }
.player__btn svg { width: 12px; height: 12px; }
.player__progress {
  flex: 1;
  height: 4px;
  background: rgba(255,255,255,0.06);
  border-radius: 99px;
  overflow: hidden;
}
.player__bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, hsl(215, 80%, 60%), hsl(195, 80%, 60%));
  transition: width 360ms var(--dgm-ease);
}
.player__step {
  font-size: 10px;
  font-family: "IBM Plex Mono", monospace;
  color: var(--dgm-text-dim);
  min-width: 28px;
  text-align: right;
}

/* ---------- canvas ---------- */
.canvas-wrap {
  background: var(--dgm-panel);
  border: 1px solid var(--dgm-line);
  border-radius: var(--dgm-radius-lg);
  position: relative;
  overflow: hidden;
  backdrop-filter: blur(14px);
}
.canvas-head {
  position: absolute;
  top: 0; left: 0; right: 0;
  padding: 14px 18px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  z-index: 5;
  pointer-events: none;
}
.canvas-head__title {
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 0.02em;
}
.canvas-head__sub {
  margin-top: 4px;
  font-size: 11px;
  font-family: "IBM Plex Mono", monospace;
  color: var(--dgm-text-dim);
  letter-spacing: 0.04em;
}
.canvas-head__meta {
  display: flex;
  gap: 8px;
  align-items: center;
  pointer-events: auto;
}

/* PRIMITIVE: pill (tag for model name etc) */
.dgm-pill {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 10.5px;
  font-family: "IBM Plex Mono", monospace;
  letter-spacing: 0.04em;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--dgm-line);
  color: var(--dgm-text-soft);
  padding: 3px 9px;
  border-radius: 99px;
}
.dgm-pill__dot {
  width: 5px; height: 5px;
  border-radius: 50%;
}

/* canvas surface */
.canvas {
  position: absolute;
  inset: 70px 18px 50px 18px;
  /* grid pattern background */
  background-image:
    linear-gradient(to right, rgba(160,195,230,0.04) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(160,195,230,0.04) 1px, transparent 1px);
  background-size: 20px 20px;
  border-radius: var(--dgm-radius-md);
}
.canvas__svg {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  pointer-events: none;
}
.canvas__nodes {
  position: absolute; inset: 0;
}
.canvas-foot {
  position: absolute;
  left: 18px; right: 18px; bottom: 12px;
  display: flex;
  justify-content: space-between;
  gap: 14px;
  font-size: 11px;
  color: var(--dgm-text-dim);
  font-family: "IBM Plex Mono", monospace;
  pointer-events: none;
}
.canvas-foot small { font-family: "Inter", sans-serif; font-size: 10.5px; opacity: 0.7; }

/* PRIMITIVE: container (group box for AI Core / AIC / AIV / IO-Die) */
.dgm-container {
  position: absolute;
  border: 1px dashed var(--cont-border, var(--dgm-line-strong));
  background: var(--cont-bg, transparent);
  border-radius: var(--dgm-radius-md);
  padding: 28px 14px 14px;
  pointer-events: none; /* children get events */
}
.dgm-container__head {
  position: absolute;
  top: 6px; left: 12px; right: 12px;
  display: flex; gap: 8px; align-items: center;
  pointer-events: auto;
}
.dgm-container__name {
  font-size: 11px;
  font-family: "IBM Plex Mono", monospace;
  letter-spacing: 0.06em;
  color: var(--cont-fg, var(--dgm-text-soft));
  text-transform: uppercase;
}
.dgm-container__hint {
  margin-left: auto;
  font-size: 10px;
  color: var(--dgm-text-dim);
  font-family: "IBM Plex Mono", monospace;
}

/* container themes */
.dgm-container--core   { --cont-border: hsla(215, 60%, 65%, 0.35); --cont-fg: hsla(215, 75%, 80%, 0.9); }
.dgm-container--aic    { --cont-border: hsla(var(--c-aic-h), 70%, 65%, 0.45); --cont-fg: hsla(var(--c-aic-h), 80%, 78%, 0.95); --cont-bg: hsla(var(--c-aic-h), 70%, 35%, 0.06); }
.dgm-container--aiv    { --cont-border: hsla(var(--c-aiv-h), 60%, 60%, 0.45); --cont-fg: hsla(var(--c-aiv-h), 70%, 75%, 0.95); --cont-bg: hsla(var(--c-aiv-h), 60%, 30%, 0.06); }
.dgm-container--shared { --cont-border: hsla(var(--c-shared-h), 60%, 60%, 0.35); --cont-fg: hsla(var(--c-shared-h), 70%, 75%, 0.9); }
.dgm-container--io     { --cont-border: hsla(var(--c-claim-h), 60%, 65%, 0.4); --cont-fg: hsla(var(--c-claim-h), 70%, 80%, 0.85); --cont-bg: hsla(var(--c-claim-h), 60%, 30%, 0.04); border-style: dashed; }
.dgm-container--external { --cont-border: hsla(var(--c-shared-h), 50%, 60%, 0.25); --cont-fg: hsla(var(--c-shared-h), 60%, 70%, 0.7); }

/* PRIMITIVE: cell (storage / compute / mover / scalar) */
.dgm-cell {
  position: absolute;
  border-radius: var(--dgm-radius-sm);
  background: var(--cell-bg, hsla(var(--cell-h), 50%, 30%, 0.18));
  border: 1px solid var(--cell-border, hsla(var(--cell-h), 60%, 60%, 0.45));
  color: var(--dgm-text);
  padding: 7px 10px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 1px;
  cursor: pointer;
  transition: transform var(--dgm-fast) var(--dgm-ease),
              border-color var(--dgm-fast),
              box-shadow var(--dgm-fast),
              opacity var(--dgm-fast);
  pointer-events: auto;
  z-index: 2;
  --cell-h: var(--c-shared-h);
}
.dgm-cell:hover {
  border-color: hsla(var(--cell-h), 80%, 70%, 0.7);
  box-shadow: 0 4px 18px hsla(var(--cell-h), 60%, 30%, 0.35);
}
.dgm-cell.is-selected {
  border-color: hsla(var(--cell-h), 90%, 75%, 0.95);
  box-shadow: 0 0 0 2px hsla(var(--cell-h), 90%, 65%, 0.35), 0 6px 22px hsla(var(--cell-h), 60%, 30%, 0.45);
}
.dgm-cell.is-dim { opacity: 0.32; filter: saturate(0.5); }
.dgm-cell.is-active {
  border-color: hsla(var(--cell-h), 95%, 80%, 1);
  box-shadow: 0 0 0 2px hsla(var(--cell-h), 90%, 65%, 0.4), 0 6px 22px hsla(var(--cell-h), 80%, 40%, 0.5);
}

.dgm-cell__name {
  font-size: 12px;
  font-weight: 600;
  font-family: "IBM Plex Mono", monospace;
  letter-spacing: 0.02em;
  color: var(--dgm-text);
}
.dgm-cell__sub {
  font-size: 10px;
  color: var(--dgm-text-dim);
  font-weight: 400;
}

/* cell kind themes (set --cell-h + variations) */
.dgm-cell--shared  { --cell-h: var(--c-shared-h); }
.dgm-cell--aic     { --cell-h: var(--c-aic-h); }
.dgm-cell--aiv     { --cell-h: var(--c-aiv-h); }
.dgm-cell--mte     { --cell-h: var(--c-mte-h); }
.dgm-cell--sdma    { --cell-h: var(--c-sdma-h); }
.dgm-cell--claim   { --cell-h: var(--c-claim-h); opacity: 0.8; border-style: dashed; }

/* compute = filled stronger, with chip notch */
.dgm-cell--compute {
  background: linear-gradient(180deg, hsla(var(--cell-h), 70%, 40%, 0.45), hsla(var(--cell-h), 70%, 25%, 0.2));
  border-width: 1.5px;
  position: relative;
}
.dgm-cell--compute::before,
.dgm-cell--compute::after {
  content: "";
  position: absolute;
  width: 5px; height: 5px;
  background: hsla(var(--cell-h), 80%, 70%, 0.7);
  border-radius: 50%;
}
.dgm-cell--compute::before { top: -3px; left: 8px; }
.dgm-cell--compute::after  { bottom: -3px; right: 8px; }

/* scalar = small grey controller */
.dgm-cell--scalar {
  --cell-h: var(--c-scalar-h);
  background: rgba(255,255,255,0.04);
  border-color: rgba(255,255,255,0.18);
  border-style: dotted;
}
.dgm-cell--scalar:hover { border-color: rgba(255,255,255,0.4); }
.dgm-cell--scalar .dgm-cell__name { color: var(--dgm-text-soft); }

/* mover = slim amber bar */
.dgm-cell--mte {
  padding: 4px 8px;
  border-style: solid;
  background: linear-gradient(90deg, hsla(var(--c-mte-h), 80%, 35%, 0.32), hsla(var(--c-mte-h), 80%, 35%, 0.12));
  border-color: hsla(var(--c-mte-h), 80%, 60%, 0.5);
}
.dgm-cell--mte .dgm-cell__name { color: hsla(var(--c-mte-h), 90%, 80%, 0.95); }

/* Status modifiers for cells */
.dgm-cell.is-claim { opacity: var(--status-claim); border-style: dashed; }
.dgm-cell.is-partial { opacity: var(--status-partial); }
.dgm-cell.is-claim::after,
.dgm-cell.is-partial::after {
  content: attr(data-status-label);
  position: absolute;
  top: -8px; right: 6px;
  font-size: 9px;
  font-family: "IBM Plex Mono", monospace;
  background: var(--dgm-bg-1);
  border: 1px solid var(--dgm-line);
  padding: 1px 5px;
  border-radius: 99px;
  color: var(--dgm-text-dim);
  letter-spacing: 0.04em;
}

/* PRIMITIVE: edge (SVG path) — styles via class */
.dgm-edge {
  fill: none;
  stroke: hsla(var(--c-mte-h), 80%, 65%, 0.55);
  stroke-width: 1.5;
  transition: stroke var(--dgm-fast), stroke-width var(--dgm-fast), opacity var(--dgm-fast);
  pointer-events: stroke;
  cursor: pointer;
}
.dgm-edge:hover { stroke-width: 2.5; }

.dgm-edge--verified { stroke-dasharray: none; }
.dgm-edge--partial  { stroke-dasharray: 6 3; }
.dgm-edge--claim    { stroke-dasharray: 2 4; opacity: var(--status-claim); }

.dgm-edge.is-dim { opacity: 0.18; }
.dgm-edge.is-active {
  stroke-width: 2.5;
  filter: drop-shadow(0 0 6px hsla(var(--c-mte-h), 90%, 60%, 0.6));
  animation: dash-flow 1.6s linear infinite;
  stroke-dasharray: 8 5;
}
@keyframes dash-flow {
  to { stroke-dashoffset: -39; }
}

/* edge color variants by mover kind */
.dgm-edge--mte    { stroke: hsla(var(--c-mte-h), 80%, 65%, 0.6); }
.dgm-edge--mte.is-active { filter: drop-shadow(0 0 6px hsla(var(--c-mte-h), 90%, 60%, 0.55)); }
.dgm-edge--sdma   { stroke: hsla(var(--c-sdma-h), 70%, 70%, 0.6); }
.dgm-edge--sdma.is-active { filter: drop-shadow(0 0 6px hsla(var(--c-sdma-h), 90%, 60%, 0.55)); }
.dgm-edge--bus    { stroke: hsla(var(--c-shared-h), 70%, 70%, 0.4); }
.dgm-edge--cube   { stroke: hsla(var(--c-aic-h), 70%, 70%, 0.55); }
.dgm-edge--vec    { stroke: hsla(var(--c-aiv-h), 70%, 70%, 0.55); }
.dgm-edge--claim  { stroke: hsla(var(--c-claim-h), 70%, 75%, 0.55); }

/* edge label (in foreignObject in SVG, styled here) */
.dgm-edge-label {
  font-size: 10px;
  font-family: "IBM Plex Mono", monospace;
  background: var(--dgm-bg-1);
  border: 1px solid var(--dgm-line);
  color: var(--dgm-text-soft);
  padding: 2px 6px;
  border-radius: 4px;
  white-space: nowrap;
  letter-spacing: 0.04em;
}

/* ---------- right inspector ---------- */
.inspector {
  background: var(--dgm-panel);
  border: 1px solid var(--dgm-line);
  border-radius: var(--dgm-radius-lg);
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  backdrop-filter: blur(14px);
  overflow: auto;
}
.inspector__empty {
  color: var(--dgm-text-dim);
  font-size: 12px;
  text-align: center;
  padding: 30px 10px;
  border: 1px dashed var(--dgm-line);
  border-radius: var(--dgm-radius-md);
}

/* PRIMITIVE: badge */
.dgm-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 2px 8px;
  border-radius: 99px;
  font-size: 10px;
  font-family: "IBM Plex Mono", monospace;
  letter-spacing: 0.04em;
  border: 1px solid currentColor;

.dgm-badge[data-status="verified"] { color: hsl(145, 60%, 65%); background: hsla(145, 60%, 30%, 0.18); }
.dgm-badge[data-status="partial"]  { color: hsl(40, 90%, 65%);  background: hsla(40, 90%, 35%, 0.18); }
.dgm-badge[data-status="claim"]    { color: hsl(280, 60%, 75%); background: hsla(280, 60%, 35%, 0.18); }

/* PRIMITIVE: inspector card */
.dgm-card {
  display: flex; flex-direction: column; gap: 12px;
}
.dgm-card__head {
  display: flex; align-items: center; gap: 10px;
}
.dgm-card__icon {
  width: 36px; height: 36px;
  border-radius: 9px;
  background: hsla(var(--card-h, var(--c-shared-h)), 60%, 35%, 0.4);
  border: 1px solid hsla(var(--card-h, var(--c-shared-h)), 70%, 60%, 0.5);
  display: grid; place-items: center;
  font-family: "IBM Plex Mono", monospace;
  font-size: 14px;
  font-weight: 600;
  color: hsla(var(--card-h, var(--c-shared-h)), 90%, 85%, 0.95);
  flex-shrink: 0;
}
.dgm-card__title {
  font-size: 14px;
  font-weight: 700;
}
.dgm-card__title small {
  display: block;
  font-size: 10.5px;
  color: var(--dgm-text-dim);
  font-weight: 400;
  font-family: "IBM Plex Mono", monospace;
  margin-top: 2px;
  letter-spacing: 0.03em;
}

.dgm-card__row {
  display: grid;
  grid-template-columns: 88px 1fr;
  gap: 10px;
  align-items: start;
  padding: 8px 0;
  border-top: 1px solid var(--dgm-line);
  font-size: 12px;
}
.dgm-card__row:first-of-type { border-top: 0; padding-top: 0; }
.dgm-card__key {
  color: var(--dgm-text-dim);
  font-size: 11px;
  font-family: "IBM Plex Mono", monospace;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.dgm-card__val { color: var(--dgm-text); }
.dgm-card__val code {
  font-family: "IBM Plex Mono", monospace;
  background: rgba(255,255,255,0.06);
  padding: 1px 5px;
  border-radius: 3px;
  font-size: 11px;
}
.dgm-card__source {
  font-size: 10.5px;
  color: var(--dgm-text-faint);
  border-top: 1px solid var(--dgm-line);
  padding-top: 8px;
  font-family: "IBM Plex Mono", monospace;
  letter-spacing: 0.03em;
}

/* ---------- bottom: legend + path ---------- */
.bottom {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 14px;
  background: var(--dgm-panel);
  border: 1px solid var(--dgm-line);
  border-radius: var(--dgm-radius-lg);
  padding: 12px 18px;
  align-items: center;
  backdrop-filter: blur(14px);
}

/* PRIMITIVE: legend */
.dgm-legend {
  display: flex;
  gap: 14px;
  align-items: center;
  flex-wrap: wrap;
  border-right: 1px solid var(--dgm-line);
  padding-right: 18px;
}
.dgm-legend__item {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  font-size: 11px;
  color: var(--dgm-text-soft);
  font-family: "IBM Plex Mono", monospace;
  letter-spacing: 0.04em;
}
.dgm-legend__line {
  width: 22px; height: 1px;
}
.dgm-legend__line--verified { border-top: 1.5px solid hsl(145, 60%, 60%); }
.dgm-legend__line--partial  { border-top: 1.5px dashed hsl(40, 90%, 60%); }
.dgm-legend__line--claim    { border-top: 1.5px dotted hsl(280, 60%, 65%); }

/* PRIMITIVE: pathline (current path step chips) */
.dgm-pathline {
  display: flex;
  gap: 5px;
  align-items: center;
  flex-wrap: wrap;
  font-family: "IBM Plex Mono", monospace;
  font-size: 11.5px;
}
.dgm-pathline__chip {
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--dgm-line);
  border-radius: 5px;
  padding: 3px 8px;
  color: var(--dgm-text-soft);
  transition: all var(--dgm-fast);
}
.dgm-pathline__chip.is-active {
  background: hsla(215, 70%, 50%, 0.25);
  border-color: hsla(215, 80%, 65%, 0.55);
  color: var(--dgm-text);
  box-shadow: 0 0 0 2px hsla(215, 80%, 65%, 0.18);
}
.dgm-pathline__chip.is-done {
  color: var(--dgm-text-dim);
  background: rgba(255,255,255,0.02);
}
.dgm-pathline__via {
  color: var(--dgm-text-dim);
  font-size: 10px;
  padding: 0 2px;
}
.dgm-pathline__arrow {
  color: var(--dgm-text-faint);
  font-family: "IBM Plex Mono", monospace;
}

/* notice banner inside canvas (e.g. scenario not applicable) */
.canvas-notice {
  position: absolute;
  bottom: 56px;
  left: 50%;
  transform: translateX(-50%);
  background: hsla(40, 90%, 30%, 0.35);
  border: 1px solid hsla(40, 90%, 60%, 0.5);
  color: hsla(40, 90%, 88%, 0.95);
  padding: 6px 14px;
  border-radius: 99px;
  font-size: 11px;
  font-family: "IBM Plex Mono", monospace;
  letter-spacing: 0.04em;
  z-index: 8;
  display: none;
}
.canvas-notice.is-on { display: block; }

/* small responsive: collapse rails */
@media (max-width: 1180px) {
  .workbench { grid-template-columns: 200px 1fr 270px; }
}
@media (max-width: 980px) {
  .workbench { grid-template-columns: 1fr; }
  .rail, .inspector { max-height: 180px; }
}

/* scrollbars subtle */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 99px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.16); }

function cacheNodePositions() {
  const cRect = $canvas.getBoundingClientRect();
  document.querySelectorAll(".dgm-cell").forEach(el => {
    const r = el.getBoundingClientRect();
    posCache[el.dataset.alt] = {
      x: r.left - cRect.left,
      y: r.top - cRect.top,
      w: r.width,
      h: r.height,
      cx: r.left - cRect.left + r.width / 2,
      cy: r.top - cRect.top + r.height / 2,
    };
  });
}

function curvePath(p1, p2, curve) {
  // returns SVG path d string (cubic bezier) plus midpoint for label
  const dx = p2.x - p1.x;
  const dy = p2.y - p1.y;
  let cp1x, cp1y, cp2x, cp2y;
  if (curve === "right" || curve === "right2") {
    const off = curve === "right2" ? 90 : 60;
    cp1x = p1.x + off; cp1y = p1.y;
    cp2x = p2.x + off; cp2y = p2.y;
  } else if (curve === "left" || curve === "left2") {
    const off = curve === "left2" ? 80 : 50;
    cp1x = p1.x - off; cp1y = p1.y;
    cp2x = p2.x - off; cp2y = p2.y;
  } else if (curve === "top") {
    const off = 80;
    cp1x = p1.x; cp1y = p1.y - off;
    cp2x = p2.x; cp2y = p2.y - off;
  } else if (curve === "right-tight") {
    cp1x = p1.x + 30; cp1y = p1.y;
    cp2x = p2.x + 30; cp2y = p2.y;
  } else if (curve === "loop-right") {
    cp1x = p1.x + 60; cp1y = p1.y - 20;
    cp2x = p2.x + 60; cp2y = p2.y + 20;
  } else if (curve === "loop-left") {
    cp1x = p1.x - 60; cp1y = p1.y - 20;
    cp2x = p2.x - 60; cp2y = p2.y + 20;
  } else {
    // straight-ish with slight bow
    const mx = (p1.x + p2.x) / 2;
    const my = (p1.y + p2.y) / 2;
    cp1x = mx; cp1y = p1.y;
    cp2x = mx; cp2y = p2.y;
  }
  const d = `M ${p1.x} ${p1.y} C ${cp1x} ${cp1y}, ${cp2x} ${cp2y}, ${p2.x} ${p2.y}`;
  // approximate midpoint
  const mid = bezierMid(p1, {x:cp1x,y:cp1y}, {x:cp2x,y:cp2y}, p2);
  return { d, mid };
}
function bezierMid(p0, p1, p2, p3) {
  const t = 0.5;
  const x = (1-t)**3*p0.x + 3*(1-t)**2*t*p1.x + 3*(1-t)*t**2*p2.x + t**3*p3.x;
  const y = (1-t)**3*p0.y + 3*(1-t)**2*t*p1.y + 3*(1-t)*t**2*p2.y + t**3*p3.y;
  return { x, y };
}

function pickAnchor(p1, p2) {
  // pick edge anchors on each cell so connector starts/ends at the boundary
  // simple: nearest side midpoint
  function side(a, b) {
    const dx = b.cx - a.cx;
    const dy = b.cy - a.cy;
    if (Math.abs(dx) > Math.abs(dy)) {
      return dx > 0 ? { x: a.x + a.w, y: a.cy } : { x: a.x, y: a.cy };
    } else {
      return dy > 0 ? { x: a.cx, y: a.y + a.h } : { x: a.cx, y: a.y };
    }
  }
  return [side(p1, p2), side(p2, p1)];
}

function renderEdges() {
  const v = VIEWS[state.view];
  $edges.innerHTML = "";
  v.edges.forEach((e, idx) => {
    const a = posCache[e.from];
    const b = posCache[e.to];
    if (!a || !b) return;
    const [pa, pb] = pickAnchor(a, b);
    const { d, mid } = curvePath(pa, pb, e.curve);

    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
    path.setAttribute("d", d);
    path.setAttribute("class", `dgm-edge dgm-edge--${e.kind} dgm-edge--${e.status}`);
    path.setAttribute("marker-end", `url(#arr-${e.kind})`);
    path.dataset.from = e.from;
    path.dataset.to = e.to;
    path.dataset.idx = idx;
    path.dataset.status = e.status;
    if (e._coop) path.dataset.coop = "1";
    path.addEventListener("click", () => selectEdge(idx));
    $edges.appendChild(path);

    if (e.label) {
      const fo = document.createElementNS("http://www.w3.org/2000/svg", "foreignObject");
      const w = Math.max(60, e.label.length * 7);
      fo.setAttribute("x", mid.x - w/2);
      fo.setAttribute("y", mid.y - 10);
      fo.setAttribute("width", w);
      fo.setAttribute("height", 22);
      fo.style.pointerEvents = "none";
      fo.innerHTML = `<div xmlns="http://www.w3.org/1999/xhtml" class="dgm-edge-label">${e.label}</div>`;
      $edges.appendChild(fo);
    }
  });
}

  });

  $scenarioList.innerHTML = "";
  SCENARIOS.forEach(s => {
    const supported = s.applies.includes(state.view);
    const disabledByClaim = s.isClaim && !state.showClaim;
    const disabled = !supported || disabledByClaim;
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "dgm-list__item";
    btn.dataset.scenario = s.id;
    btn.setAttribute("aria-selected", state.scenarioId === s.id ? "true" : "false");
    if (disabled) {
      btn.setAttribute("disabled", "");
      btn.title = !supported ? `当前视图 ${VIEWS[state.view].label} 下不适用` : "已隐藏 claim 层，开启后可查看";
    }
    btn.innerHTML = `
      <span class="dgm-list__bullet" data-status="${s.status}"></span>
      <span class="dgm-list__name">${s.name}</span>
      <span class="dgm-list__count">${(s.paths[state.view]||[]).length || "—"}</span>
    `;
    btn.addEventListener("click", () => {
      if (disabled) return;
      selectScenario(s.id);
    });
    $scenarioList.appendChild(btn);
  });
}

/* ============================================================
   SELECTION & SCENARIOS
   ============================================================ */
function getScenario(id) {
  return SCENARIOS.find(s => s.id === id);
}

function selectScenario(id, reset = false) {
  const s = getScenario(id);
  if (!s) return;
  const supported = s.applies.includes(state.view);
  $notice.classList.remove("is-on");

  if (!supported) {
    $notice.textContent = `场景 “${s.name}” 在当前视图下不适用`;
    $notice.classList.add("is-on");
    state.scenarioId = id;
    buildScenarioList();
    clearActive();
    renderPathLine([]);
    return;
  }
  state.scenarioId = id;
  state.playStep = 0;
  if (reset) stopPlay();
  buildScenarioList();
  highlightScenario(s);
  renderPathLine(s.paths[state.view] || [], 0);
}

function highlightScenario(s) {
  clearActive();
  const path = s.paths[state.view];
  if (!path) return;

  // dim all cells/edges first
  document.querySelectorAll(".dgm-cell").forEach(c => c.classList.add("is-dim"));
  $edges.querySelectorAll("path").forEach(p => p.classList.add("is-dim"));

  // activate cells in path
  path.forEach(altId => {
    const cell = document.querySelector(`.dgm-cell[data-alt="${altId}"]`);
    if (cell) { cell.classList.remove("is-dim"); cell.classList.add("is-active"); }
  });
  // activate edges that match consecutive path pairs
  for (let i = 0; i < path.length - 1; i++) {
    const a = path[i], b = path[i+1];
    const edge = $edges.querySelector(`path[data-from="${a}"][data-to="${b}"]`);
    if (edge) { edge.classList.remove("is-dim"); edge.classList.add("is-active"); }
  }
}

function clearActive() {
  document.querySelectorAll(".dgm-cell").forEach(c => {
    c.classList.remove("is-dim", "is-active");
  });
  $edges.querySelectorAll("path").forEach(p => p.classList.remove("is-dim", "is-active"));
}

function selectNode(altId) {
  state.selectedEdge = null;
  state.selectedNodeAlt = altId;
  document.querySelectorAll(".dgm-cell").forEach(c => c.classList.remove("is-selected"));
  const cell = document.querySelector(`.dgm-cell[data-alt="${altId}"]`);
  if (cell) cell.classList.add("is-selected");
  renderInspectorForNode(altId);
}

function selectEdge(idx) {
  state.selectedNodeAlt = null;
  state.selectedEdge = idx;
  document.querySelectorAll(".dgm-cell").forEach(c => c.classList.remove("is-selected"));
  renderInspectorForEdge(idx);
}

/* ============================================================
   INSPECTOR
   ============================================================ */
function renderInspectorForNode(altId) {
  // resolve ref
  const view = VIEWS[state.view];
  const all = [...(view.nodes || []), ...(view.extras || [])];
  const n = all.find(x => nodeKey(x) === altId);
  const def = NODE_LIB[n?.ref];
  if (!def) { $inspector.innerHTML = `<div class="inspector__empty">未找到对象</div>`; return; }

  const ownerHint = inferOwner(def);
  const compute = def.compute ? "计算单元" : (def.kind === "mte" ? "搬运 / 随路处理单元" : (def.kind === "sdma" ? "独立 DMA 引擎" : (def.kind === "scalar" ? "调度 / 控制单元" : "存储单元")));

  $inspector.innerHTML = `
    <div class="dgm-card">
      <div class="dgm-card__head">
        <div class="dgm-card__icon" style="--card-h: var(--c-${def.kind})">${def.name.slice(0,2)}</div>
        <div>
          <div class="dgm-card__title">${def.name}<small>${def.full}</small></div>
        </div>
        <div style="margin-left:auto"><span class="dgm-badge" data-status="${def.status}">${def.status}</span></div>
      </div>
      <div class="dgm-card__row">
        <span class="dgm-card__key">类型</span>
        <span class="dgm-card__val">${compute}</span>
      </div>
      <div class="dgm-card__row">
        <span class="dgm-card__key">归属</span>
        <span class="dgm-card__val">${ownerHint}</span>
      </div>
      <div class="dgm-card__row">
        <span class="dgm-card__key">用途</span>
        <span class="dgm-card__val">${def.purpose}</span>
      </div>
      <div class="dgm-card__row">
        <span class="dgm-card__key">软件可见性</span>
        <span class="dgm-card__val">${def.visibility}</span>
      </div>
      ${def.kind === "aic" || def.ref === "AIC" ? `<div class="dgm-card__row">
        <span class="dgm-card__key">配比注</span>
        <span class="dgm-card__val">参考型号 910B4：1 AIC : 2 AIV；SKU 间会有差异</span>
      </div>` : ""}
      <div class="dgm-card__source">来源 · 02-knowledge/00-shared/ascend-aicore-hardware/overview.md</div>
    </div>
  `;
}

function renderInspectorForEdge(idx) {
  const e = VIEWS[state.view].edges[idx];
  if (!e) { $inspector.innerHTML = `<div class="inspector__empty">未找到通路</div>`; return; }
  const fromDef = NODE_LIB[posRefOf(e.from)];
  const toDef = NODE_LIB[posRefOf(e.to)];
  $inspector.innerHTML = `
    <div class="dgm-card">
      <div class="dgm-card__head">
        <div class="dgm-card__icon" style="--card-h: var(--c-${e.kind === 'cube' ? 'aic' : (e.kind === 'vec' ? 'aiv' : (e.kind === 'sdma' ? 'sdma' : (e.kind === 'claim' ? 'claim' : 'mte')))})">→</div>
        <div>
          <div class="dgm-card__title">${fromDef?.name || e.from} → ${toDef?.name || e.to}<small>${e.label || "通路"}</small></div>
        </div>
        <div style="margin-left:auto"><span class="dgm-badge" data-status="${e.status}">${e.status}</span></div>
      </div>
      <div class="dgm-card__row">
        <span class="dgm-card__key">类型</span>
        <span class="dgm-card__val">${edgeKindLabel(e.kind)}</span>
      </div>
      <div class="dgm-card__row">
        <span class="dgm-card__key">方向</span>
        <span class="dgm-card__val"><code>${e.from}</code> → <code>${e.to}</code></span>
      </div>
      ${e.label ? `<div class="dgm-card__row">
        <span class="dgm-card__key">PyPTO 对应</span>
        <span class="dgm-card__val">${edgeOpcodeHint(e)}</span>
      </div>` : ""}
      <div class="dgm-card__source">来源 · ${e.status === 'claim' ? 'CSDN PTO ISA 文章 (claim)' : 'CANN 官方文档'}</div>
    </div>
  `;
}

function posRefOf(altId) {
  const v = VIEWS[state.view];
  const all = [...(v.nodes||[]), ...(v.extras||[])];
  const n = all.find(x => nodeKey(x) === altId);
  return n?.ref || altId;
}
function edgeKindLabel(k) {
  return ({
    mte: "MTE 搬运 (同步, 经 UB / Local Memory)",
    sdma: "SDMA (异步, GM↔GM 直传, 不经 UB)",
    bus: "总线 / BIU",
    cube: "AIC 内部计算流水",
    vec: "AIV 内部计算流水",
    claim: "[claim] 待官方/源码确认",
  })[k] || k;
}
function edgeOpcodeHint(e) {
  // map common edges to PyPTO opcodes seen in block-graph.md
  if (e.kind === "mte" && e.label?.includes("MTE2")) return "<code>COPY_IN</code>";
  if (e.kind === "mte" && e.label?.includes("MTE3")) return "<code>COPY_OUT</code>";
  if (e.from === "MTE1" && (e.to === "L0A" || e.to === "L0B")) return "<code>L1_TO_L0A</code> / <code>L1_TO_L0Bt</code>";
  if (e.from === "L0A" && e.to === "Cube") return "<code>A_MULACC_B</code> 输入端";
  if (e.from === "L0C" && e.to === "Cube") return "<code>A_MULACC_B</code> 累加端";
  return "—";
}
function inferOwner(def) {
  if (def.kind === "shared") return "AI Core 外（共享）";
  if (def.kind === "sdma")   return "AI Core 外独立引擎";
  if (def.kind === "claim")  return "[claim] 待确认归属";
  if (state.view === "coupled") return "AI Core 内（耦合架构下 Cube/Vector 同核）";
  if (def.kind === "aic" || def.kind === "scalar" && def.full?.includes("AIC")) return "AIC / Cube Core";
  if (def.kind === "aiv" || def.kind === "scalar" && def.full?.includes("AIV")) return "AIV / Vector Core";
  if (def.kind === "scalar") return state.view === "coupled" ? "AI Core 共享" : "各核独立";
  return "AI Core 内";
}

/* ============================================================
   PATH LINE (bottom)
   ============================================================ */
function renderPathLine(path, activeIdx = -1) {
  if (!path.length) {
    $pathLine.innerHTML = `<span class="dgm-pathline__chip" style="opacity:.5">— 无适用路径 —</span>`;
    $playStep.textContent = "0/0";
    $playBar.style.width = "0%";
    return;
  }
  const items = [];
  path.forEach((id, i) => {
    const def = NODE_LIB[posRefOf(id)] || { name: id };
    let cls = "dgm-pathline__chip";
    if (i === activeIdx) cls += " is-active";
    else if (activeIdx >= 0 && i < activeIdx) cls += " is-done";
    items.push(`<span class="${cls}">${def.name}</span>`);
    if (i < path.length - 1) {
      items.push(`<span class="dgm-pathline__arrow">→</span>`);
    }
  });
  $pathLine.innerHTML = items.join("");
  $playStep.textContent = `${Math.max(0, activeIdx + 1)}/${path.length}`;
  $playBar.style.width = `${path.length ? ((activeIdx + 1) / path.length) * 100 : 0}%`;
}

/* ============================================================
   PLAY CONTROLS
   ============================================================ */
function tickPlay() {
  const s = getScenario(state.scenarioId);
  if (!s) return;
  const path = s.paths[state.view];
  if (!path) return;
  state.playStep = (state.playStep + 1) % path.length;
  renderPathLine(path, state.playStep);
  pulseStep(path, state.playStep);
}

function pulseStep(path, step) {
  // dim everything off-path; pulse the current cell + incoming edge
  clearActive();
  document.querySelectorAll(".dgm-cell").forEach(c => c.classList.add("is-dim"));
  $edges.querySelectorAll("path").forEach(p => p.classList.add("is-dim"));

  // light up cumulative path up to step
  for (let i = 0; i <= step; i++) {
    const cell = document.querySelector(`.dgm-cell[data-alt="${path[i]}"]`);
    if (cell) {
      cell.classList.remove("is-dim");
      if (i === step) cell.classList.add("is-active");
    }
    if (i > 0) {
      const edge = $edges.querySelector(`path[data-from="${path[i-1]}"][data-to="${path[i]}"]`);
      if (edge) {
        edge.classList.remove("is-dim");
        if (i === step) edge.classList.add("is-active");
      }
    }
  }
}

function startPlay() {
  state.playing = true;
  $playIcon.setAttribute("d", "M3 2h2v8H3zm4 0h2v8H7z");
  state.playTimer = setInterval(tickPlay, 900);
}
function stopPlay() {
  state.playing = false;
  $playIcon.setAttribute("d", "M3 2l7 4-7 4z");
  if (state.playTimer) { clearInterval(state.playTimer); state.playTimer = null; }
}

document.getElementById("playToggle").addEventListener("click", () => {
  if (state.playing) stopPlay();
  else {
    const s = getScenario(state.scenarioId);
    if (!s || !s.paths[state.view]) return;
    state.playStep = -1;
    startPlay();
  }
});
document.getElementById("playPrev").addEventListener("click", () => {
  const s = getScenario(state.scenarioId);
  const path = s?.paths[state.view];
  if (!path) return;
  state.playStep = (state.playStep - 1 + path.length) % path.length;
  renderPathLine(path, state.playStep);
  pulseStep(path, state.playStep);
});
document.getElementById("playNext").addEventListener("click", () => {
  const s = getScenario(state.scenarioId);
  const path = s?.paths[state.view];
  if (!path) return;
  state.playStep = (state.playStep + 1) % path.length;
  renderPathLine(path, state.playStep);
  pulseStep(path, state.playStep);
});

/* ============================================================
   TOP CONTROLS
   ============================================================ */
document.querySelectorAll(".dgm-tabbar__btn").forEach(btn => {
  btn.addEventListener("click", () => {
    const v = btn.dataset.view;
    if (v === state.view) return;
    state.view = v;
    document.querySelectorAll(".dgm-tabbar__btn").forEach(b => b.setAttribute("aria-selected", b.dataset.view === v ? "true" : "false"));
    // try to keep current scenario; if not supported, fall back to first verified
    const cur = getScenario(state.scenarioId);
    if (!cur || !cur.applies.includes(v)) {
      state.scenarioId = SCENARIOS.find(s => s.applies.includes(v) && !s.isClaim)?.id || SCENARIOS[0].id;
    }
    stopPlay();
    renderView();
  });
});

document.getElementById("claimToggle").addEventListener("change", e => {
  state.showClaim = e.target.checked;
  applyClaimVisibility();
  // re-highlight current scenario
  const s = getScenario(state.scenarioId);
  if (s) selectScenario(state.scenarioId);
});

/* ============================================================
   INIT
   ============================================================ */
buildMarkers();
// set initial tab
document.querySelectorAll(".dgm-tabbar__btn").forEach(b => b.setAttribute("aria-selected", b.dataset.view === state.view ? "true" : "false"));
renderView();

// re-render on resize (recompute edges)
let resizeTimer;
window.addEventListener("resize", () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    cacheNodePositions();
    renderEdges();
    const s = getScenario(state.scenarioId);
    if (s) highlightScenario(s);
  }, 120);
});
</script>

</body>
</html>
